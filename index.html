<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent 运行日志 / 工作流总览</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d1117;
    color: #e6edf3;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    font-size: 13px;
    min-height: 100vh;
  }

  /* ============ 顶部工具栏 ============ */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: #161b22;
    border-bottom: 1px solid #21262d;
    flex-wrap: wrap;
    gap: 10px;
  }

  .toolbar-title {
    font-size: 16px;
    font-weight: 600;
    color: #e6edf3;
  }

  .toolbar-left { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .toolbar-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

  .filter-group {
    display: flex;
    align-items: center;
    gap: 6px;
    color: #8b949e;
    font-size: 12px;
  }

  .filter-group label { white-space: nowrap; }

  select {
    background: #21262d;
    border: 1px solid #30363d;
    color: #e6edf3;
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    outline: none;
  }

  select:hover { border-color: #388bfd; }

  .divider { width: 1px; height: 20px; background: #21262d; }

  /* 自动刷新开关 */
  .toggle-row {
    display: flex;
    align-items: center;
    gap: 8px;
    color: #8b949e;
    font-size: 12px;
  }

  .toggle {
    position: relative;
    width: 36px;
    height: 20px;
    cursor: pointer;
  }

  .toggle input { opacity: 0; width: 0; height: 0; }

  .toggle-slider {
    position: absolute;
    inset: 0;
    background: #21262d;
    border-radius: 20px;
    transition: background 0.2s;
  }

  .toggle-slider::before {
    content: '';
    position: absolute;
    width: 14px;
    height: 14px;
    background: #8b949e;
    border-radius: 50%;
    top: 3px;
    left: 3px;
    transition: transform 0.2s, background 0.2s;
  }

  .toggle input:checked + .toggle-slider { background: #1f6feb; }
  .toggle input:checked + .toggle-slider::before { transform: translateX(16px); background: #fff; }

  .interval-select {
    background: #21262d;
    border: 1px solid #30363d;
    color: #e6edf3;
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    outline: none;
  }

  .btn {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 5px 12px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    border: 1px solid #30363d;
    background: #21262d;
    color: #e6edf3;
    white-space: nowrap;
    transition: border-color 0.15s, background 0.15s;
  }

  .btn:hover { border-color: #388bfd; background: #1f2937; }
  .btn svg { flex-shrink: 0; }

  /* ============ 主体容器 ============ */
  .container { padding: 16px 20px; }

  /* ============ 统计卡片 ============ */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 12px;
    margin-bottom: 16px;
  }

  @media (max-width: 1100px) { .cards-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 700px) { .cards-grid { grid-template-columns: repeat(2, 1fr); } }

  .card {
    background: #161b22;
    border: 1px solid #21262d;
    border-radius: 8px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    color: #8b949e;
    font-size: 12px;
  }

  .card-icon {
    width: 24px;
    height: 24px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
  }

  .card-value {
    font-size: 26px;
    font-weight: 700;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }

  .card-sub {
    font-size: 11px;
    color: #8b949e;
  }

  .card-sub span { font-weight: 600; }
  .up { color: #3fb950; }
  .down { color: #f85149; }
  .warn { color: #d29922; }

  .icon-blue { background: rgba(56, 139, 253, 0.15); color: #388bfd; }
  .icon-green { background: rgba(63, 185, 80, 0.15); color: #3fb950; }
  .icon-red { background: rgba(248, 81, 73, 0.15); color: #f85149; }
  .icon-purple { background: rgba(188, 140, 255, 0.15); color: #bc8cff; }
  .icon-orange { background: rgba(210, 153, 34, 0.15); color: #d29922; }
  .icon-warn { background: rgba(248, 81, 73, 0.15); color: #f85149; }

  /* ============ 图表区 ============ */
  .charts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 0.7fr;
    gap: 12px;
    margin-bottom: 16px;
  }

  @media (max-width: 1000px) { .charts-grid { grid-template-columns: 1fr; } }

  .chart-card {
    background: #161b22;
    border: 1px solid #21262d;
    border-radius: 8px;
    padding: 14px 16px;
  }

  .chart-title {
    font-size: 13px;
    font-weight: 600;
    color: #e6edf3;
    margin-bottom: 10px;
  }

  .chart-legend {
    display: flex;
    gap: 14px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: #8b949e;
  }

  .legend-dot {
    width: 10px;
    height: 2px;
    border-radius: 2px;
  }

  .chart-wrap { position: relative; height: 160px; }

  /* 饼图 */
  .pie-wrap { position: relative; height: 160px; display: flex; align-items: center; justify-content: center; }

  .pie-legend {
    margin-top: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .pie-legend-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 11px;
  }

  .pie-legend-left {
    display: flex;
    align-items: center;
    gap: 6px;
    color: #8b949e;
  }

  .pie-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .pie-legend-right {
    display: flex;
    gap: 12px;
    color: #e6edf3;
    font-variant-numeric: tabular-nums;
  }

  .pie-pct { color: #8b949e; min-width: 35px; text-align: right; }
  .pie-count { min-width: 30px; text-align: right; }

  /* ============ 底部区域 ============ */
  .bottom-grid {
    display: grid;
    grid-template-columns: 1.5fr 1fr;
    gap: 12px;
  }

  @media (max-width: 900px) { .bottom-grid { grid-template-columns: 1fr; } }

  .log-card {
    background: #161b22;
    border: 1px solid #21262d;
    border-radius: 8px;
    overflow: hidden;
  }

  .log-header {
    padding: 12px 16px;
    font-size: 13px;
    font-weight: 600;
    border-bottom: 1px solid #21262d;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .live-dot {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: #3fb950;
  }

  .live-dot::before {
    content: '';
    width: 7px;
    height: 7px;
    background: #3fb950;
    border-radius: 50%;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th {
    font-size: 11px;
    font-weight: 500;
    color: #8b949e;
    text-align: left;
    padding: 8px 16px;
    background: #0d1117;
    border-bottom: 1px solid #21262d;
    white-space: nowrap;
  }

  td {
    padding: 9px 16px;
    border-bottom: 1px solid #21262d;
    font-size: 12px;
    color: #e6edf3;
    white-space: nowrap;
  }

  tr:last-child td { border-bottom: none; }

  .status-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
  }

  .badge-success { background: rgba(63, 185, 80, 0.15); color: #3fb950; }
  .badge-fail { background: rgba(248, 81, 73, 0.15); color: #f85149; }
  .badge-running { background: rgba(56, 139, 253, 0.15); color: #388bfd; }

  .link-btn {
    color: #388bfd;
    cursor: pointer;
    font-size: 12px;
    text-decoration: none;
    white-space: nowrap;
  }

  .link-btn:hover { text-decoration: underline; }

  /* 告警日志 */
  .alert-list { padding: 8px 0; }

  .alert-item {
    display: flex;
    gap: 10px;
    padding: 10px 16px;
    border-bottom: 1px solid #21262d;
    transition: background 0.15s;
    cursor: pointer;
  }

  .alert-item:last-child { border-bottom: none; }
  .alert-item:hover { background: #1c2128; }

  .alert-icon {
    width: 30px;
    height: 30px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 14px;
    margin-top: 2px;
  }

  .alert-icon-red { background: rgba(248, 81, 73, 0.15); }
  .alert-icon-orange { background: rgba(210, 153, 34, 0.15); }
  .alert-icon-blue { background: rgba(56, 139, 253, 0.15); }

  .alert-body { flex: 1; min-width: 0; }

  .alert-title {
    font-size: 12px;
    font-weight: 600;
    color: #e6edf3;
    margin-bottom: 3px;
  }

  .alert-desc {
    font-size: 11px;
    color: #8b949e;
    line-height: 1.4;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .alert-time {
    font-size: 11px;
    color: #8b949e;
    white-space: nowrap;
    margin-top: 2px;
  }

  .view-all {
    display: block;
    text-align: center;
    padding: 10px;
    color: #388bfd;
    font-size: 12px;
    cursor: pointer;
    border-top: 1px solid #21262d;
  }

  .view-all:hover { background: #1c2128; }

  /* 数字跳动动画 */
  .flash {
    animation: flash 0.5s ease;
  }

  @keyframes flash {
    0% { opacity: 0.4; }
    100% { opacity: 1; }
  }

  /* 刷新时间戳 */
  .refresh-hint {
    font-size: 11px;
    color: #484f58;
    padding: 8px 20px 0;
    text-align: right;
  }
</style>
</head>
<body>

<!-- 顶部工具栏 -->
<div class="toolbar">
  <div class="toolbar-left">
    <span class="toolbar-title">Agent 运行日志 / 工作流总览</span>
    <div class="divider"></div>
    <div class="filter-group">
      <label>时间范围</label>
      <select id="timeRange" onchange="onFilterChange()">
        <option value="1h">近 1 小时</option>
        <option value="6h">近 6 小时</option>
        <option value="24h" selected>近 24 小时</option>
        <option value="7d">近 7 天</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Agent 类型</label>
      <select id="agentType" onchange="onFilterChange()">
        <option value="all">全部</option>
        <option value="code">代码分析</option>
        <option value="test">测试执行</option>
        <option value="doc">文档生成</option>
        <option value="review">审查评估</option>
      </select>
    </div>
  </div>
  <div class="toolbar-right">
    <div class="toggle-row">
      <label class="toggle">
        <input type="checkbox" id="autoRefresh" checked onchange="toggleAutoRefresh()">
        <span class="toggle-slider"></span>
      </label>
      <span>自动刷新</span>
      <select class="interval-select" id="intervalSel" onchange="resetInterval()">
        <option value="15">15s</option>
        <option value="30" selected>30s</option>
        <option value="60">60s</option>
      </select>
    </div>
    <button class="btn" onclick="refreshAll()">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor">
        <path d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z"/>
        <path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z"/>
      </svg>
      手动刷新
    </button>
    <button class="btn" onclick="exportLog()">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor">
        <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/>
        <path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z"/>
      </svg>
      导出日志
    </button>
  </div>
</div>

<div class="container">

  <!-- 统计卡片 -->
  <div class="cards-grid">
    <div class="card">
      <div class="card-header">
        <span>总执行任务数</span>
        <div class="card-icon icon-blue">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
            <path d="M2.5 3a.5.5 0 0 0 0 1h11a.5.5 0 0 0 0-1h-11zm0 3a.5.5 0 0 0 0 1h11a.5.5 0 0 0 0-1h-11zm0 3a.5.5 0 0 0 0 1h11a.5.5 0 0 0 0-1h-11zm0 3a.5.5 0 0 0 0 1h11a.5.5 0 0 0 0-1h-11z"/>
          </svg>
        </div>
      </div>
      <div class="card-value" id="totalTasks">1,284</div>
      <div class="card-sub">较昨日 <span class="up" id="totalDelta">+18.6%</span></div>
    </div>

    <div class="card">
      <div class="card-header">
        <span>成功任务数</span>
        <div class="card-icon icon-green">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
            <path d="M13.854 3.646a.5.5 0 0 1 0 .708l-7 7a.5.5 0 0 1-.708 0l-3.5-3.5a.5.5 0 1 1 .708-.708L6.5 10.293l6.646-6.647a.5.5 0 0 1 .708 0z"/>
          </svg>
        </div>
      </div>
      <div class="card-value" id="successTasks">1,197</div>
      <div class="card-sub">成功率 <span class="up" id="successRate">93.22%</span></div>
    </div>

    <div class="card">
      <div class="card-header">
        <span>失败任务数</span>
        <div class="card-icon icon-red">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
            <path d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708z"/>
          </svg>
        </div>
      </div>
      <div class="card-value" id="failTasks">87</div>
      <div class="card-sub">失败率 <span class="down" id="failRate">-7.4%</span></div>
    </div>

    <div class="card">
      <div class="card-header">
        <span>总 Token 消耗</span>
        <div class="card-icon icon-purple">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2zm3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/>
          </svg>
        </div>
      </div>
      <div class="card-value" style="font-size:20px" id="totalTokens">12,845,671</div>
      <div class="card-sub">较昨日 <span class="up" id="tokenDelta">+15.3%</span></div>
    </div>

    <div class="card">
      <div class="card-header">
        <span>平均响应时间</span>
        <div class="card-icon icon-orange">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 3.5a.5.5 0 0 0-1 0V9a.5.5 0 0 0 .252.434l3.5 2a.5.5 0 0 0 .496-.868L8 8.71V3.5z"/>
            <path d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16zm7-8A7 7 0 1 1 1 8a7 7 0 0 1 14 0z"/>
          </svg>
        </div>
      </div>
      <div class="card-value" id="avgLatency">3.21s</div>
      <div class="card-sub">较昨日 <span class="up" id="latencyDelta">-0.78s</span></div>
    </div>

    <div class="card">
      <div class="card-header">
        <span>告警数</span>
        <div class="card-icon icon-warn">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
            <path d="M7.938 2.016A.13.13 0 0 1 8.002 2a.13.13 0 0 1 .063.016.146.146 0 0 1 .054.057l6.857 11.667c.036.06.035.124.002.183a.163.163 0 0 1-.054.06.116.116 0 0 1-.066.017H1.146a.115.115 0 0 1-.066-.017.163.163 0 0 1-.054-.06.176.176 0 0 1 .002-.183L7.884 2.073a.147.147 0 0 1 .054-.057zm1.044-.45a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767L8.982 1.566z"/>
            <path d="M7.002 12a1 1 0 1 1 2 0 1 1 0 0 1-2 0zM7.1 5.995a.905.905 0 1 1 1.8 0l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995z"/>
          </svg>
        </div>
      </div>
      <div class="card-value" id="alertCount">12</div>
      <div class="card-sub">较昨日 <span class="down" id="alertDelta">-25.0%</span></div>
    </div>
  </div>

  <!-- 图表区 -->
  <div class="charts-grid">
    <!-- 任务执行趋势 -->
    <div class="chart-card">
      <div class="chart-title">任务执行趋势</div>
      <div class="chart-legend">
        <div class="legend-item"><div class="legend-dot" style="background:#388bfd"></div>总任务数</div>
        <div class="legend-item"><div class="legend-dot" style="background:#3fb950"></div>成功任务数</div>
        <div class="legend-item"><div class="legend-dot" style="background:#f85149"></div>失败任务数</div>
      </div>
      <div class="chart-wrap"><canvas id="taskChart"></canvas></div>
    </div>

    <!-- Token 消耗趋势 -->
    <div class="chart-card">
      <div class="chart-title">Token 消耗趋势</div>
      <div class="chart-legend">
        <div class="legend-item"><div class="legend-dot" style="background:#bc8cff"></div>Token 数</div>
      </div>
      <div class="chart-wrap"><canvas id="tokenChart"></canvas></div>
    </div>

    <!-- Agent 执行分布 -->
    <div class="chart-card">
      <div class="chart-title">Agent 执行分布</div>
      <div class="pie-wrap"><canvas id="pieChart"></canvas></div>
      <div class="pie-legend" id="pieLegend"></div>
    </div>
  </div>

  <!-- 底部 -->
  <div class="bottom-grid">
    <!-- 实时运行日志 -->
    <div class="log-card">
      <div class="log-header">
        <span>实时运行日志</span>
        <span class="live-dot">实时</span>
      </div>
      <table>
        <thead>
          <tr>
            <th>时间</th>
            <th>Agent</th>
            <th>任务类型</th>
            <th>状态</th>
            <th>耗时</th>
            <th>Token 消耗</th>
            <th>详情</th>
          </tr>
        </thead>
        <tbody id="logBody"></tbody>
      </table>
    </div>

    <!-- 告警日志 -->
    <div class="log-card">
      <div class="log-header">
        <span>告警日志</span>
        <span style="font-size:11px;color:#8b949e">最近 24h</span>
      </div>
      <div class="alert-list" id="alertList"></div>
      <a class="view-all" href="#">查看全部告警</a>
    </div>
  </div>

</div>

<div class="refresh-hint" id="refreshHint"></div>

<script>
// ============================
// 数据生成
// ============================
const AGENT_TYPES = ['代码分析 Agent', '测试执行 Agent', '文档生成 Agent', '审查评估 Agent', '代码分析 Agent'];
const TASK_TYPES = ['代码质量扫描', '单元测试执行', 'API 文档生成', '代码审查评估', '集成测试执行', '代码重构分析', '安全漏洞扫描'];
const PIE_LABELS = ['代码分析 Agent', '测试执行 Agent', '文档生成 Agent', '审查评估 Agent', '其他 Agent'];
const PIE_COLORS = ['#388bfd', '#3fb950', '#bc8cff', '#d29922', '#8b949e'];

function genHourLabels() {
  const labels = [];
  for (let i = 0; i <= 24; i += 2) {
    labels.push((i < 10 ? '0' : '') + i + ':00');
  }
  return labels;
}

function genTaskData(base) {
  return Array.from({ length: 13 }, () => Math.floor(base * (0.6 + Math.random() * 0.8)));
}

function genTokenData() {
  return Array.from({ length: 13 }, () => Math.floor(300000 + Math.random() * 900000));
}

function genLogRow() {
  const now = new Date();
  const sec = now.getSeconds().toString().padStart(2, '0');
  const min = now.getMinutes().toString().padStart(2, '0');
  const hour = now.getHours().toString().padStart(2, '0');
  const time = `${hour}:${min}:${sec}`;
  const agent = AGENT_TYPES[Math.floor(Math.random() * AGENT_TYPES.length)];
  const task = TASK_TYPES[Math.floor(Math.random() * TASK_TYPES.length)];
  const ok = Math.random() > 0.07;
  const duration = (Math.random() * 12 + 0.5).toFixed(ok ? 2 : 1) + 's';
  const tokens = Math.floor(Math.random() * 150000 + 5000).toLocaleString();
  return { time, agent, task, ok, duration, tokens };
}

const ALERTS = [
  { icon: '⚠', cls: 'alert-icon-red', title: '任务执行超时', desc: '测试执行 Agent 任务执行超时，任务ID: task_20240601_143512', time: '14:35:12' },
  { icon: '⚡', cls: 'alert-icon-orange', title: 'Token 消耗异常', desc: '文档生成 Agent Token 消耗超过阈值，任务ID: task_20240601_143508', time: '14:35:08' },
  { icon: '🔗', cls: 'alert-icon-red', title: 'API 调用失败', desc: '代码分析 Agent 调用第三方 API 失败，任务ID: task_20240601_143505', time: '14:35:05' },
  { icon: 'ℹ', cls: 'alert-icon-blue', title: '系统资源告警', desc: '内存使用率超过 80%，当前使用率：85.2%', time: '14:35:02' },
];

// ============================
// 图表初始化
// ============================
const hours = genHourLabels();

const CHART_DEFAULTS = {
  responsive: true,
  maintainAspectRatio: false,
  plugins: { legend: { display: false }, tooltip: {
    backgroundColor: '#1c2128',
    borderColor: '#30363d',
    borderWidth: 1,
    titleColor: '#8b949e',
    bodyColor: '#e6edf3',
    padding: 10,
    callbacks: {
      label: ctx => ' ' + ctx.formattedValue
    }
  }},
  scales: {
    x: {
      grid: { color: '#21262d', drawBorder: false },
      ticks: { color: '#484f58', font: { size: 10 }, maxTicksLimit: 7 }
    },
    y: {
      grid: { color: '#21262d', drawBorder: false },
      ticks: { color: '#484f58', font: { size: 10 } },
      beginAtZero: true
    }
  },
  elements: { point: { radius: 0, hoverRadius: 4 } },
  animation: { duration: 600 }
};

function makeGrad(ctx, color) {
  const g = ctx.createLinearGradient(0, 0, 0, 160);
  g.addColorStop(0, color + '33');
  g.addColorStop(1, color + '00');
  return g;
}

// 任务图表
let taskChart, tokenChart, pieChart;

function initCharts() {
  const tcCtx = document.getElementById('taskChart').getContext('2d');
  const totalData = genTaskData(100);
  const successData = totalData.map(v => Math.floor(v * (0.88 + Math.random() * 0.1)));
  const failData = totalData.map((v, i) => v - successData[i]);

  taskChart = new Chart(tcCtx, {
    type: 'line',
    data: {
      labels: hours,
      datasets: [
        {
          data: totalData,
          borderColor: '#388bfd', borderWidth: 2,
          backgroundColor: makeGrad(tcCtx, '#388bfd'), fill: true, tension: 0.4
        },
        {
          data: successData,
          borderColor: '#3fb950', borderWidth: 2,
          backgroundColor: 'transparent', fill: false, tension: 0.4
        },
        {
          data: failData,
          borderColor: '#f85149', borderWidth: 2,
          backgroundColor: 'transparent', fill: false, tension: 0.4
        }
      ]
    },
    options: { ...CHART_DEFAULTS }
  });

  const tokCtx = document.getElementById('tokenChart').getContext('2d');
  tokenChart = new Chart(tokCtx, {
    type: 'line',
    data: {
      labels: hours,
      datasets: [{
        data: genTokenData(),
        borderColor: '#bc8cff', borderWidth: 2,
        backgroundColor: makeGrad(tokCtx, '#bc8cff'), fill: true, tension: 0.4
      }]
    },
    options: {
      ...CHART_DEFAULTS,
      scales: {
        ...CHART_DEFAULTS.scales,
        y: {
          ...CHART_DEFAULTS.scales.y,
          ticks: {
            color: '#484f58', font: { size: 10 },
            callback: v => v >= 1000000 ? (v / 1000000).toFixed(1) + 'M' : v >= 1000 ? (v / 1000).toFixed(0) + 'k' : v
          }
        }
      }
    }
  });

  const pieData = [418, 318, 240, 182, 126];
  const pieCtx = document.getElementById('pieChart').getContext('2d');
  pieChart = new Chart(pieCtx, {
    type: 'doughnut',
    data: {
      labels: PIE_LABELS,
      datasets: [{
        data: pieData,
        backgroundColor: PIE_COLORS,
        borderColor: '#0d1117',
        borderWidth: 3,
        hoverOffset: 6
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: '62%',
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1c2128',
          borderColor: '#30363d',
          borderWidth: 1,
          titleColor: '#8b949e',
          bodyColor: '#e6edf3',
          padding: 10,
        }
      },
      animation: { duration: 600 }
    }
  });

  // 渲染饼图图例
  const total = pieData.reduce((a, b) => a + b, 0);
  const legend = document.getElementById('pieLegend');
  legend.innerHTML = '';
  PIE_LABELS.forEach((label, i) => {
    const pct = ((pieData[i] / total) * 100).toFixed(1) + '%';
    legend.innerHTML += `
      <div class="pie-legend-item">
        <div class="pie-legend-left">
          <div class="pie-dot" style="background:${PIE_COLORS[i]}"></div>
          <span>${label}</span>
        </div>
        <div class="pie-legend-right">
          <span class="pie-pct">${pct}</span>
          <span class="pie-count">${pieData[i]}</span>
        </div>
      </div>`;
  });

  // 中心文字
  Chart.register({
    id: 'centerText',
    afterDraw(chart) {
      if (chart.config.type !== 'doughnut') return;
      const { ctx, chartArea: { top, bottom, left, right } } = chart;
      const cx = (left + right) / 2, cy = (top + bottom) / 2;
      ctx.save();
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#8b949e';
      ctx.font = '11px sans-serif';
      ctx.fillText('总计', cx, cy - 10);
      ctx.fillStyle = '#e6edf3';
      ctx.font = 'bold 18px sans-serif';
      ctx.fillText('1,284', cx, cy + 8);
      ctx.restore();
    }
  });
}

// ============================
// 日志渲染
// ============================
let logRows = [];

function initLog() {
  const now = new Date();
  for (let i = 7; i >= 0; i--) {
    const d = new Date(now - i * 3000 - Math.random() * 2000);
    const sec = d.getSeconds().toString().padStart(2, '0');
    const min = d.getMinutes().toString().padStart(2, '0');
    const hour = d.getHours().toString().padStart(2, '0');
    logRows.push({ ...genLogRow(), time: `${hour}:${min}:${sec}` });
  }
  renderLog();
}

function renderLog() {
  const tbody = document.getElementById('logBody');
  tbody.innerHTML = logRows.slice(-8).reverse().map(r => `
    <tr>
      <td style="color:#8b949e">${r.time}</td>
      <td>${r.agent}</td>
      <td>${r.task}</td>
      <td><span class="status-badge ${r.ok ? 'badge-success' : 'badge-fail'}">${r.ok ? '成功' : '失败'}</span></td>
      <td style="color:#8b949e">${r.duration}</td>
      <td style="color:#8b949e">${r.tokens}</td>
      <td><a class="link-btn" href="#">查看详情</a></td>
    </tr>`).join('');
}

function addLogRow() {
  logRows.push(genLogRow());
  if (logRows.length > 50) logRows.shift();
  renderLog();
}

// ============================
// 告警渲染
// ============================
function renderAlerts() {
  const list = document.getElementById('alertList');
  list.innerHTML = ALERTS.map(a => `
    <div class="alert-item">
      <div class="alert-icon ${a.cls}">${a.icon}</div>
      <div class="alert-body">
        <div class="alert-title">${a.title}</div>
        <div class="alert-desc">${a.desc}</div>
      </div>
      <div class="alert-time">${a.time}</div>
    </div>`).join('');
}

// ============================
// 刷新逻辑
// ============================
function refreshAll() {
  // 更新图表数据
  const totalData = genTaskData(100);
  const successData = totalData.map(v => Math.floor(v * (0.88 + Math.random() * 0.1)));
  const failData = totalData.map((v, i) => v - successData[i]);

  taskChart.data.datasets[0].data = totalData;
  taskChart.data.datasets[1].data = successData;
  taskChart.data.datasets[2].data = failData;
  taskChart.update();

  tokenChart.data.datasets[0].data = genTokenData();
  tokenChart.update();

  // 添加日志
  addLogRow();

  // 更新时间戳
  const now = new Date();
  document.getElementById('refreshHint').textContent = '上次更新：' + now.toLocaleTimeString('zh-CN');
}

function onFilterChange() {
  refreshAll();
}

// 自动刷新
let timer = null;

function toggleAutoRefresh() {
  const checked = document.getElementById('autoRefresh').checked;
  if (checked) resetInterval();
  else { clearInterval(timer); timer = null; }
}

function resetInterval() {
  clearInterval(timer);
  const secs = parseInt(document.getElementById('intervalSel').value) * 1000;
  if (document.getElementById('autoRefresh').checked) {
    timer = setInterval(() => { addLogRow(); }, secs);
  }
}

function exportLog() {
  const rows = logRows.slice(-50);
  const csv = ['时间,Agent,任务类型,状态,耗时,Token消耗',
    ...rows.map(r => `${r.time},${r.agent},${r.task},${r.ok ? '成功' : '失败'},${r.duration},${r.tokens}`)
  ].join('\n');
  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'agent-logs.csv';
  a.click();
}

// ============================
// 启动
// ============================
document.addEventListener('DOMContentLoaded', () => {
  initCharts();
  initLog();
  renderAlerts();
  resetInterval();
  document.getElementById('refreshHint').textContent = '上次更新：' + new Date().toLocaleTimeString('zh-CN');
});
</script>
</body>
</html>
